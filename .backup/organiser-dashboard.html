<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organiser Dashboard - CU Events</title>
  <meta name="description" content="Manage your events, view registrations, track analytics, and access marketing tools for your CU Events.">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div id="navbar-slot"></div>
  <div id="auth-modal-slot"></div>

  <!-- Dashboard Hero Header -->
  <div class="dash-hero org-hero" id="dashHero">
    <div class="container">
      <div class="dash-hero__inner">
        <div class="dash-hero__profile">
          <div class="dash-hero__avatar org-avatar" id="dashAvatar">?</div>
          <div class="dash-hero__info">
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <h1 id="dashName">Organiser</h1>
              <span class="role-badge role-badge--organiser"><i data-lucide="target"></i> Organiser</span>
            </div>
            <p id="dashId">Organiser Dashboard</p>
            <div class="dash-hero__tags" id="dashTags"></div>
          </div>
        </div>
        <div class="dash-hero__actions">
          <a href="create-event.html" class="btn btn-primary">+ Create Event</a>
          <a href="events.html" class="btn btn-secondary"
            style="background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);color:white;">Browse Events</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard Navigation Tabs -->
  <div class="dash-tabs-wrapper">
    <div class="container">
      <nav class="dash-tabs" id="dashTabs">
        <button class="dash-tab active" onclick="orgSwitchTab('overview',this)" data-tab="overview">
          <span class="dash-tab__label"><i data-lucide="bar-chart"></i> Overview</span>
        </button>
        <button class="dash-tab" onclick="orgSwitchTab('events',this)" data-tab="events">
          <span class="dash-tab__label">🎫 My Events</span>
        </button>
        <button class="dash-tab" onclick="orgSwitchTab('analytics',this)" data-tab="analytics">
          <span class="dash-tab__label">📈 Analytics</span>
        </button>
        <button class="dash-tab" onclick="orgSwitchTab('attendees',this)" data-tab="attendees">
          <span class="dash-tab__label"><i data-lucide="users"></i> Attendees</span>
        </button>
        <button class="dash-tab" onclick="orgSwitchTab('marketing',this)" data-tab="marketing">
          <span class="dash-tab__label">📣 PR & Marketing</span>
        </button>
        <button class="dash-tab" onclick="orgSwitchTab('settings',this)" data-tab="settings">
          <span class="dash-tab__label"><i data-lucide="settings"></i> Settings</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Dashboard Content -->
  <div class="container">
    <main class="dash-content" id="dashContent">
      <div class="dash-loading">
        <div class="dash-loading__spinner"></div>
        <p>Loading organiser dashboard...</p>
      </div>
    </main>
  </div>
  <div id="footer-slot"></div>
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/organiser-dashboard.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
</body>

</html>
